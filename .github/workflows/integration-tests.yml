name: Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  integration:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24.15.0'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Start test infrastructure
        run: npm run infra:test:up

      - name: Run test migrations
        run: npm run db:migrate:test

      - name: Run integration tests
        run: ENV_FILE=.env.test npm run test:integration

      - name: Save docker compose logs
        if: ${{ failure() }}
        run: docker compose --env-file .env.test -f compose.yml -f compose.test.yml logs > compose-test.log

      - name: Upload docker compose logs
        uses: actions/upload-artifact@v7.0.1
        if: ${{ failure() }}
        with:
          name: compose-test-log-${{ github.run_id }}
          path: compose-test.log

      - name: Stop test infrastructure
        if: ${{ always() }}
        run: npm run infra:test:down
